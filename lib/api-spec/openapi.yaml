openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: StockBTP - API de gestion de stock pour entreprise de construction de conteneurs
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: products
    description: Gestion des produits
  - name: stock-movements
    description: Mouvements de stock
  - name: projects
    description: Gestion des projets
  - name: project-materials
    description: Matériaux par projet
  - name: invoices
    description: Facturation
  - name: users
    description: Utilisateurs
  - name: dashboard
    description: Tableaux de bord et statistiques

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── PRODUCTS ────────────────────────────────────────────────────────────────
  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: Liste tous les produits
      parameters:
        - name: category
          in: query
          schema: { type: string }
        - name: low_stock
          in: query
          schema: { type: boolean }
        - name: search
          in: query
          schema: { type: string }
        - name: location
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
      responses:
        "200":
          description: Liste des produits
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: createProduct
      tags: [products]
      summary: Créer un produit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "201":
          description: Produit créé
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Détails d'un produit
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Produit trouvé
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Produit non trouvé
    patch:
      operationId: updateProduct
      tags: [products]
      summary: Modifier un produit
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductUpdate"
      responses:
        "200":
          description: Produit modifié
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Supprimer un produit (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Supprimé

  /products/categories:
    get:
      operationId: listProductCategories
      tags: [products]
      summary: Liste des catégories
      responses:
        "200":
          description: Liste des catégories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategoryStat"

  # ─── STOCK MOVEMENTS ─────────────────────────────────────────────────────────
  /stock-movements:
    get:
      operationId: listStockMovements
      tags: [stock-movements]
      summary: Historique des mouvements
      parameters:
        - name: product_id
          in: query
          schema: { type: integer }
        - name: project_id
          in: query
          schema: { type: integer }
        - name: type
          in: query
          schema: { type: string, enum: [IN, OUT] }
        - name: from_date
          in: query
          schema: { type: string }
        - name: to_date
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
      responses:
        "200":
          description: Liste des mouvements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StockMovement"
    post:
      operationId: createStockMovement
      tags: [stock-movements]
      summary: Enregistrer un mouvement de stock
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StockMovementInput"
      responses:
        "201":
          description: Mouvement créé
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockMovement"
        "400":
          description: Stock insuffisant ou données invalides

  /stock-movements/{id}:
    get:
      operationId: getStockMovement
      tags: [stock-movements]
      summary: Détails d'un mouvement
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Mouvement trouvé
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockMovement"

  # ─── PROJECTS ────────────────────────────────────────────────────────────────
  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: Liste des projets
      parameters:
        - name: status
          in: query
          schema: { type: string, enum: [active, completed, paused] }
      responses:
        "200":
          description: Liste des projets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
    post:
      operationId: createProject
      tags: [projects]
      summary: Créer un projet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectInput"
      responses:
        "201":
          description: Projet créé
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /projects/{id}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Détails d'un projet
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Projet trouvé
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          description: Non trouvé
    patch:
      operationId: updateProject
      tags: [projects]
      summary: Modifier un projet
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectUpdate"
      responses:
        "200":
          description: Projet modifié
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /projects/{id}/materials:
    get:
      operationId: getProjectMaterials
      tags: [project-materials]
      summary: Matériaux utilisés sur un projet
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Matériaux du projet
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProjectMaterial"
    post:
      operationId: addProjectMaterial
      tags: [project-materials]
      summary: Ajouter un matériau à un projet
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectMaterialInput"
      responses:
        "201":
          description: Matériau ajouté
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectMaterial"

  # ─── INVOICES ────────────────────────────────────────────────────────────────
  /invoices:
    get:
      operationId: listInvoices
      tags: [invoices]
      summary: Liste des factures
      responses:
        "200":
          description: Liste des factures
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Invoice"
    post:
      operationId: createInvoice
      tags: [invoices]
      summary: Créer une facture
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvoiceInput"
      responses:
        "201":
          description: Facture créée
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceWithItems"
        "400":
          description: Données invalides ou stock insuffisant

  /invoices/{id}:
    get:
      operationId: getInvoice
      tags: [invoices]
      summary: Détails d'une facture
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Facture trouvée
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceWithItems"
        "404":
          description: Facture introuvable

  /invoices/{id}/status:
    patch:
      operationId: updateInvoiceStatus
      tags: [invoices]
      summary: Changer le statut d'une facture
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvoiceStatusUpdate"
      responses:
        "200":
          description: Statut mis à jour
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"
        "400":
          description: Stock insuffisant ou transition invalide

  # ─── USERS ───────────────────────────────────────────────────────────────────
  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: Liste des utilisateurs
      responses:
        "200":
          description: Liste des utilisateurs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      operationId: createUser
      tags: [users]
      summary: Créer un utilisateur
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserInput"
      responses:
        "201":
          description: Utilisateur créé
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Détails d'un utilisateur
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Utilisateur trouvé
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    patch:
      operationId: updateUser
      tags: [users]
      summary: Modifier un utilisateur
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: Utilisateur modifié
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  # ─── AUTH ────────────────────────────────────────────────────────────────────
  /auth/login:
    post:
      operationId: login
      tags: [users]
      summary: Connexion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Connexion réussie
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Identifiants invalides

  /auth/logout:
    post:
      operationId: logout
      tags: [users]
      summary: Déconnexion
      responses:
        "200":
          description: Déconnecté

  /auth/me:
    get:
      operationId: getMe
      tags: [users]
      summary: Utilisateur courant
      responses:
        "200":
          description: Utilisateur courant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Non authentifié

  # ─── DASHBOARD ───────────────────────────────────────────────────────────────
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Résumé global du tableau de bord
      responses:
        "200":
          description: Statistiques globales
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/recent-movements:
    get:
      operationId: getRecentMovements
      tags: [dashboard]
      summary: Derniers mouvements de stock
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 10 }
      responses:
        "200":
          description: Derniers mouvements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StockMovement"

  /dashboard/low-stock:
    get:
      operationId: getLowStockProducts
      tags: [dashboard]
      summary: Produits en stock critique
      responses:
        "200":
          description: Produits sous le seuil minimal
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"

  /dashboard/stock-by-category:
    get:
      operationId: getStockByCategory
      tags: [dashboard]
      summary: Stock regroupé par catégorie
      responses:
        "200":
          description: Stock par catégorie
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategoryStat"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    # ─── PRODUCT ─────────────────────────────────────────────────────────────
    Product:
      type: object
      required: [id, name, category, unit, quantityInStock, minimumThreshold, location, createdAt, updatedAt]
      properties:
        id: { type: integer }
        name: { type: string }
        category: { type: string }
        unit: { type: string, enum: [kg, m, litre, piece] }
        quantityInStock: { type: integer }
        minimumThreshold: { type: integer }
        location: { type: string, enum: [warehouse, site, project] }
        createdAt: { type: string }
        updatedAt: { type: string }

    ProductInput:
      type: object
      required: [name, category, unit, minimumThreshold, location]
      properties:
        name: { type: string, minLength: 1 }
        category: { type: string, minLength: 1 }
        unit: { type: string, enum: [kg, m, litre, piece] }
        quantityInStock: { type: integer, default: 0 }
        minimumThreshold: { type: integer, default: 0 }
        location: { type: string, enum: [warehouse, site, project] }

    ProductUpdate:
      type: object
      properties:
        name: { type: string, minLength: 1 }
        category: { type: string }
        unit: { type: string, enum: [kg, m, litre, piece] }
        minimumThreshold: { type: integer }
        location: { type: string, enum: [warehouse, site, project] }

    CategoryStat:
      type: object
      required: [category, totalQuantity, productCount]
      properties:
        category: { type: string }
        totalQuantity: { type: integer }
        productCount: { type: integer }

    # ─── STOCK MOVEMENT ──────────────────────────────────────────────────────
    StockMovement:
      type: object
      required: [id, productId, type, quantity, reason, createdById, createdAt]
      properties:
        id: { type: integer }
        productId: { type: integer }
        productName: { type: ["string", "null"] }
        type: { type: string, enum: [IN, OUT] }
        quantity: { type: integer }
        reason: { type: string }
        projectId: { type: ["integer", "null"] }
        projectName: { type: ["string", "null"] }
        createdById: { type: integer }
        createdByName: { type: ["string", "null"] }
        createdAt: { type: string }

    StockMovementInput:
      type: object
      required: [productId, type, quantity, reason, createdById]
      properties:
        productId: { type: integer }
        type: { type: string, enum: [IN, OUT] }
        quantity: { type: integer, minimum: 1 }
        reason: { type: string, minLength: 1 }
        projectId: { type: ["integer", "null"] }
        createdById: { type: integer }

    # ─── PROJECT ─────────────────────────────────────────────────────────────
    Project:
      type: object
      required: [id, name, status, createdAt]
      properties:
        id: { type: integer }
        name: { type: string }
        clientName: { type: ["string", "null"] }
        status: { type: string, enum: [active, completed, paused] }
        startDate: { type: ["string", "null"] }
        endDate: { type: ["string", "null"] }
        createdAt: { type: string }

    ProjectInput:
      type: object
      required: [name, status]
      properties:
        name: { type: string, minLength: 1 }
        clientName: { type: string }
        status: { type: string, enum: [active, completed, paused] }
        startDate: { type: string }
        endDate: { type: string }

    ProjectUpdate:
      type: object
      properties:
        name: { type: string, minLength: 1 }
        clientName: { type: string }
        status: { type: string, enum: [active, completed, paused] }
        startDate: { type: string }
        endDate: { type: string }

    # ─── PROJECT MATERIAL ────────────────────────────────────────────────────
    ProjectMaterial:
      type: object
      required: [id, projectId, productId, quantityUsed]
      properties:
        id: { type: integer }
        projectId: { type: integer }
        productId: { type: integer }
        productName: { type: ["string", "null"] }
        quantityUsed: { type: integer }
        unit: { type: ["string", "null"] }

    ProjectMaterialInput:
      type: object
      required: [productId, quantityUsed]
      properties:
        productId: { type: integer }
        quantityUsed: { type: integer, minimum: 1 }

    # ─── INVOICE ─────────────────────────────────────────────────────────────
    Invoice:
      type: object
      required: [id, invoiceNumber, clientName, date, status, taxRate, subtotal, taxAmount, total, createdAt, updatedAt]
      properties:
        id: { type: integer }
        invoiceNumber: { type: string }
        clientName: { type: string }
        clientPhone: { type: ["string", "null"] }
        clientEmail: { type: ["string", "null"] }
        clientAddress: { type: ["string", "null"] }
        date: { type: string }
        status: { type: string, enum: [draft, unpaid, paid] }
        notes: { type: ["string", "null"] }
        taxRate: { type: number }
        subtotal: { type: number }
        taxAmount: { type: number }
        total: { type: number }
        createdById: { type: ["integer", "null"] }
        createdAt: { type: string }
        updatedAt: { type: string }

    InvoiceItem:
      type: object
      required: [id, invoiceId, description, quantity, unitPrice, totalPrice, position]
      properties:
        id: { type: integer }
        invoiceId: { type: integer }
        productId: { type: ["integer", "null"] }
        description: { type: string }
        quantity: { type: number }
        unitPrice: { type: number }
        totalPrice: { type: number }
        position: { type: integer }

    InvoiceWithItems:
      allOf:
        - $ref: "#/components/schemas/Invoice"
        - type: object
          required: [items]
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/InvoiceItem"

    InvoiceItemInput:
      type: object
      required: [description, quantity, unitPrice]
      properties:
        productId: { type: integer }
        description: { type: string, minLength: 1 }
        quantity: { type: number, minimum: 0 }
        unitPrice: { type: number, minimum: 0 }

    InvoiceInput:
      type: object
      required: [clientName, date, items]
      properties:
        clientName: { type: string, minLength: 1 }
        clientPhone: { type: string }
        clientEmail: { type: string }
        clientAddress: { type: string }
        date: { type: string }
        status: { type: string, enum: [draft, unpaid, paid] }
        notes: { type: string }
        taxRate: { type: number, minimum: 0, maximum: 100 }
        items:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/InvoiceItemInput"

    InvoiceStatusUpdate:
      type: object
      required: [status]
      properties:
        status: { type: string, enum: [draft, unpaid, paid] }

    # ─── USER ────────────────────────────────────────────────────────────────
    User:
      type: object
      required: [id, fullName, email, role, createdAt]
      properties:
        id: { type: integer }
        fullName: { type: string }
        email: { type: string }
        role: { type: string, enum: [admin, manager, worker] }
        createdAt: { type: string }

    UserInput:
      type: object
      required: [fullName, email, role, password]
      properties:
        fullName: { type: string, minLength: 1 }
        email: { type: string }
        role: { type: string, enum: [admin, manager, worker] }
        password: { type: string, minLength: 6 }

    UserUpdate:
      type: object
      properties:
        fullName: { type: string }
        role: { type: string, enum: [admin, manager, worker] }

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email: { type: string }
        password: { type: string }

    AuthResponse:
      type: object
      required: [user, token]
      properties:
        user:
          $ref: "#/components/schemas/User"
        token: { type: string }

    # ─── DASHBOARD ──────────────────────────────────────────────────────────
    DashboardSummary:
      type: object
      required: [totalProducts, totalStockValue, lowStockCount, activeProjects, todayMovementsIn, todayMovementsOut]
      properties:
        totalProducts: { type: integer }
        totalStockValue: { type: integer }
        lowStockCount: { type: integer }
        activeProjects: { type: integer }
        todayMovementsIn: { type: integer }
        todayMovementsOut: { type: integer }
