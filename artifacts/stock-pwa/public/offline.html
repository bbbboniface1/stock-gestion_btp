<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1c1917" />
    <title>Hors ligne — Stock BTP</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 32px;
        text-align: center;
        background: #1c1917;
        color: #fafaf9;
        font-family: system-ui, sans-serif;
      }
      .icon { font-size: 64px; margin-bottom: 16px; }
      h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
      p { color: #a8a29e; max-width: 320px; font-size: 14px; line-height: 1.5; margin-bottom: 8px; }
      .hint { font-size: 12px; color: #78716c; margin-bottom: 24px; }
      button {
        background: #ea580c;
        color: white;
        border: none;
        padding: 12px 28px;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="icon">📡</div>
    <h1>Pas de connexion internet</h1>
    <p>L'application fonctionne en mode hors ligne. Vous pouvez consulter vos données en cache et enregistrer des mouvements.</p>
    <p class="hint">Les modifications seront synchronisées dès le retour de la connexion.</p>
    <button type="button" onclick="history.back()">← Retour</button>
  </body>
</html>
