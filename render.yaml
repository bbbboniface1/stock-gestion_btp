services:
  - type: web
    name: stockbtp-api
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: pnpm install && pnpm run build:api
    startCommand: node artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080
      - key: SUPABASE_DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false